
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>APITestMate Report</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        h1 { color: #333; }
        .summary { background-color: #f9f9f9; padding: 15px; border-radius: 5px; margin-bottom: 20px; }
        .summary p { margin: 5px 0; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background-color: #f2f2f2; }
        .pass { color: green; font-weight: bold; }
        .fail { color: red; font-weight: bold; }
        .error-msg { color: #d9534f; font-size: 0.9em; }
    </style>
</head>
<body>
    <h1>APITestMate Test Report</h1>
    <div class="summary">
        <p><strong>Total Cases:</strong> 1</p>
        <p><strong>Passed:</strong> <span class="pass">0</span></p>
        <p><strong>Failed:</strong> <span class="fail">1</span></p>
        <p><strong>Pass Rate:</strong> 0.00%</p>
    </div>
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Method</th>
                <th>URL</th>
                <th>Status Code</th>
                <th>Duration (s)</th>
                <th>Result</th>
                <th>Error Message</th>
            </tr>
        </thead>
        <tbody>
            
            <tr>
                <td>UNKNOWN</td>
                <td>Unnamed Case</td>
                <td>GET</td>
                <td>/users/2</td>
                <td>401</td>
                <td>0.986</td>
                <td class="fail">FAIL</td>
                <td class="error-msg">Status code mismatch: expected 200, got 401; Key 'id' not found in response JSON</td>
            </tr>
            
        </tbody>
    </table>
</body>
</html>
